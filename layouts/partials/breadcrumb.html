{{ range $.pages }}
  {{ if eq .Params.defines $.category }}
    {{ if isset .Params "category"  }}
      {{ partial "breadcrumb.html" (dict "pages" $.pages "category" .Params.category) }}
    {{ end }}

    <li class="breadcrumb-item">
      <a href="{{ .Permalink }}">{{ .Title }}</a>
    </li>
  {{ end }}
{{ end }}
